<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Discovery Universe</title>

<link
rel="stylesheet"
href="style.css">

</head>

<body>

<!-- NAVBAR -->

<header class="navbar">

<h1 class="logo">
DISCOVERY
</h1>

<div class="search-box">

<input
type="text"
id="searchInput"
placeholder="Search the universe...">

<button onclick="performSearch()">
Search
</button>

</div>

</header>



<!-- HERO -->

<section class="hero">

<h2>
Enter The Discovery Universe
</h2>

<p>
Explore cinematic worlds,
gaming, music, horror,
motivation and more.
</p>

</section>



<!-- UPLOAD -->

<section class="upload-section">

<input
type="text"
id="videoLink"
placeholder="Paste YouTube link">

<button onclick="addVideo()">
Upload
</button>

</section>



<!-- VIDEO GRID -->

<div
id="videoGrid"
class="video-grid">
</div>



<!-- TRENDING -->

<section class="category-section">

<h2>Trending</h2>

<div
class="row"
id="trendingRow">
</div>

</section>



<!-- GAMING -->

<section class="category-section">

<h2>Gaming</h2>

<div
class="row"
id="gamingRow">
</div>

</section>



<!-- MUSIC -->

<section class="category-section">

<h2>Music</h2>

<div
class="row"
id="musicRow">
</div>

</section>



<!-- HORROR -->

<section class="category-section">

<h2>Horror</h2>

<div
class="row"
id="horrorRow">
</div>

</section>



<!-- MOTIVATION -->

<section class="category-section">

<h2>Motivation</h2>

<div
class="row"
id="motivationRow">
</div>

</section>



<!-- TOAST -->

<div id="toast"></div>



<!-- PLAYER -->

<div
id="popup"
class="premium-player">

<div class="player-layout">

<div class="player-main">

<iframe
id="videoFrame"
allowfullscreen>
</iframe>

<div class="player-info">

<h2 id="playerTitle">
Cinematic Experience
</h2>

<p id="playerDesc">
Discovery Universe
</p>

</div>

</div>



<div class="player-sidebar">

<h3>
More Discovery
</h3>

<div id="recommendedVideos">
</div>

</div>

</div>



<button
class="close-btn"
onclick="closeVideo()">

✕

</button>

</div>



<script src="script.js"></script>

</body>
</html>
