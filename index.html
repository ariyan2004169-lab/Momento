<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Platform</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HOME -->
<div class="page active" id="home">

  <h1 class="title">Discover</h1>

  <div class="video-grid" id="videoGrid"></div>

</div>


<!-- SEARCH -->
<div class="page" id="search">

  <h1 class="title">Search</h1>

  <input type="text" id="searchInput" placeholder="Search videos...">

</div>


<div class="page" id="upload">

  <h1 class="title">Upload Video</h1>

  <input type="text" id="videoLink"
  placeholder="Paste YouTube link">

<button onclick="addVideo()">Add Video</button>
    


</div>


<!-- ACCOUNT -->
<div class="page" id="account">

  <h1 class="title">Account</h1>

  <p>Your profile will appear here</p>

</div>


<!-- BOTTOM NAV -->
<div class="bottom-nav">

  <button onclick="showPage('home')">Home</button>
  <button onclick="showPage('search')">Search</button>

  <button class="upload-btn"
  onclick="showPage('upload')">+</button>

  <button onclick="showPage('account')">Account</button>

</div>


<script src="script.js"></script>

</body>
</html>
