<!DOCTYPE html>
<html>

<head>

  <title>Premium Discovery</title>

  <meta name="viewport"
  content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">

</head>

<body>



<!-- TOP BAR -->

<div class="top-bar">

  <h2>Discover</h2>

  <input
  id="searchInput"
  placeholder="Search...">

  <button onclick="showPage('home')">
    Home
  </button>

  <button onclick="showPage('upload')">
    Upload
  </button>

  <button onclick="showPage('account')">
    Account
  </button>

</div>



<!-- HOME -->

<div id="home" class="page active">



  <!-- HERO -->

  <div class="hero">

    <div class="hero-content">

      <h1>Premium Discovery</h1>

      <p>
        Explore immersive worlds,
        creators & cinematic experiences
      </p>

    </div>

  </div>



  <!-- CATEGORY BAR -->

  <div class="category-bar">

    <button onclick="filterVideos('All')">
      All
    </button>

    <button onclick="filterVideos('gaming')">
      Gaming
    </button>

    <button onclick="filterVideos('music')">
      Music
    </button>

    <button onclick="filterVideos('horror')">
      Horror
    </button>

    <button onclick="filterVideos('motivation')">
      Motivation
    </button>

    <button onclick="filterVideos('animation')">
      Animation
    </button>

    <button onclick="filterVideos('action')">
      Action
    </button>

  </div>



  <!-- TRENDING -->

  <div class="section-title">
    Trending
  </div>

  <div id="trendingRow"
  class="horizontal-feed">
  </div>



  <!-- GAMING -->

  <div class="section-title">
    Gaming
  </div>

  <div id="gamingRow"
  class="horizontal-feed">
  </div>



  <!-- MUSIC -->

  <div class="section-title">
    Music
  </div>

  <div id="musicRow"
  class="horizontal-feed">
  </div>



  <!-- HORROR -->

  <div class="section-title">
    Horror
  </div>

  <div id="horrorRow"
  class="horizontal-feed">
  </div>



  <!-- MOTIVATION -->

  <div class="section-title">
    Motivation
  </div>

  <div id="motivationRow"
  class="horizontal-feed">
  </div>



  <!-- ANIMATION -->

  <div class="section-title">
    Animation
  </div>

  <div id="animationRow"
  class="horizontal-feed">
  </div>



  <!-- ACTION -->

  <div class="section-title">
    Action
  </div>

  <div id="actionRow"
  class="horizontal-feed">
  </div>



  <!-- SEARCH RESULTS -->

  <div id="videoGrid"></div>

</div>



<!-- UPLOAD PAGE -->

<div id="upload" class="page">

  <div class="upload-box">

    <h2>Creator Studio</h2>

    <input
    id="videoLink"
    placeholder="Paste YouTube link">

    <button onclick="addVideo()">
      Publish
    </button>

  </div>

</div>



<!-- ACCOUNT PAGE -->

<div id="account" class="page">

  <div class="account-box">

    <h2>Your Space</h2>

    <p>
      Favorites, uploads and collections
      will appear here later.
    </p>

  </div>

</div>



<!-- POPUP -->

<div id="popup" class="popup">

  <iframe
  id="videoFrame"
  allowfullscreen>
  </iframe>

  <button onclick="closeVideo()">
    Close
  </button>

</div>



<script src="script.js"></script>

</body>
</html>
