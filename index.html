<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>MOMENTO</title>

<link
rel="stylesheet"
href="style.css">

</head>

<body>



<!-- =========================
     NAVBAR
========================= -->

<nav class="navbar">

<div class="brand-zone">

<h1 class="logo">
MOMENTO
</h1>

<p class="brand-sub">
Discover Beyond Reality
</p>

</div>



<div class="search-wrapper">

<input
type="text"
id="searchInput"
placeholder="Explore realities...">

<button onclick="performSearch()">

Search

</button>

</div>



<!-- LIVE SEARCH OVERLAY -->

<div
class="search-overlay"
id="searchOverlay">

</div>

</nav>



<!-- =========================
     HERO
========================= -->

<section class="hero">

<h2>
Enter The MOMENTO Universe
</h2>

<p>

Explore cinematic worlds,
anime energy,
dark realms,
future dimensions,
music atmospheres,
gaming universes,
and immersive discoveries.

</p>

</section>



<!-- =========================
     DISCOVERY ENGINE
========================= -->

<div class="discover-chips">

<button
data-filter="all"
class="active-chip">

Infinite Worlds

</button>



<button
data-filter="gaming">

Battle Worlds

</button>



<button
data-filter="music">

Neon Soundscapes

</button>



<button
data-filter="anime">

Anime Energy

</button>



<button
data-filter="dark">

Dark Realms

</button>



<button
data-filter="motivation">

Mind Awakening

</button>



<button
data-filter="future">

Future Dimensions

</button>



<button
data-filter="cinematic">

Cinematic Universes

</button>



<button
data-filter="action">

Action Storm

</button>

</div>



<!-- =========================
     UPLOAD
========================= -->

<section class="upload-section">

<input
type="text"
id="videoLink"
placeholder="Paste YouTube link">

<button onclick="addVideo()">

Upload

</button>

</section>



<!-- =========================
     DISCOVERY FEED
========================= -->

<section class="category-section">

<h2>
Infinite Discovery
</h2>

<div
class="video-grid"
id="videoGrid">

</div>

</section>



<!-- =========================
     PLAYER
========================= -->

<div
class="premium-player"
id="popup">



<button
class="close-btn"
onclick="closeVideo()">

✕

</button>



<div class="player-layout">



<div class="player-main">

<iframe
id="videoFrame"
allowfullscreen>

</iframe>



<div class="player-info">

<h2 id="playerTitle">
Now Playing
</h2>

<p id="playerDesc">

Cinematic Discovery Experience

</p>

</div>

</div>



<div
class="player-sidebar"
id="recommendedVideos">

</div>



</div>

</div>



<!-- =========================
     TOAST
========================= -->

<div id="toast"></div>



<script src="script.js"></script>

</body>

</html>
