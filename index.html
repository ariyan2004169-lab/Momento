<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport"
  content="width=device-width, initial-scale=1.0">

  <title>My Platform</title>

  <link rel="stylesheet"
  href="style.css">
</head>

<body>

<!-- HOME PAGE -->

<div class="page active" id="homePage">

  <h1 class="main-title">
    Discover
  </h1>
<div class="category-bar">

  <button>Trending</button>
  <button>Music</button>
  <button>Gaming</button>
  <button>Design</button>
  <button>Animation</button>
  <button>Learning</button>

</div>
  <!-- FUTURE BANNER AREA -->
  <div class="featured-banner">

  <img
  src="https://img.youtube.com/vi/D97FoacuYxY/maxresdefault.jpg">

  <div class="banner-overlay">

    <h2>
      Featured Visuals
    </h2>

    <p>
      Discover trending creative content
    </p>

  </div>

  </div>
<div class="category-bar">

  <button>Trending</button>
  <button>Music</button>
  <button>Gaming</button>
  <button>Design</button>
  <button>Animation</button>
  <button>Learning</button>
  <button>Shorts</button>

</div>
  <!-- VIDEO FEED -->
  <div class="video-grid"
  id="videoGrid"></div>

</div>



<!-- SEARCH PAGE -->

<div class="page"
id="searchPage">

  <h1 class="main-title">
    Search
  </h1>

  <input
  type="text"
  id="searchInput"
  placeholder="Search videos...">

</div>



<!-- UPLOAD PAGE -->

<div class="page"
id="uploadPage">

  <h1 class="main-title">
    Upload
  </h1>

  <input
  type="text"
  id="videoLink"
  placeholder="Paste YouTube link">

  <button onclick="addVideo()">
    Add Video
  </button>

</div>



<!-- ACCOUNT PAGE -->

<div class="page"
id="accountPage">

  <h1 class="main-title">
    Account
  </h1>

  <p>
    Future profile system
  </p>

</div>



<!-- VIDEO PLAYER POPUP -->

<div id="videoPopup">

  <div class="popup-content">

    <span id="closePopup">
      ✕
    </span>

    <iframe
    id="videoFrame"
    frameborder="0"
    allowfullscreen>
    </iframe>

  </div>

</div>



<!-- BOTTOM NAVIGATION -->

<div class="bottom-nav">

  <button
  onclick="showPage('homePage')">
    Home
  </button>

  <button
  onclick="showPage('searchPage')">
    Search
  </button>

  <button
  class="upload-btn"
  onclick="showPage('uploadPage')">
    +
  </button>

  <button
  onclick="showPage('accountPage')">
    Account
  </button>

</div>


<script src="script.js"></script>

</body>
</html>
