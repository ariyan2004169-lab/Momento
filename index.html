<!DOCTYPE html>
<html>
<head>
  <title>Premium Video App</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- TOP NAV -->
<div class="top-bar">
  <h2>Discover</h2>

  <input id="searchInput" placeholder="Search...">

  <button onclick="showPage('home')">Home</button>
  <button onclick="showPage('upload')">Upload</button>
  <button onclick="showPage('account')">Account</button>
</div>

<!-- HOME PAGE -->
<div id="home" class="page active">

  <div class="hero">
    <h1>Premium Discovery</h1>
    <p>Explore content in a new way</p>
  </div>

  <div class="category-bar">
    <button onclick="filterVideos('All')">All</button>
    <button onclick="filterVideos('Trending')">Trending</button>
    <button onclick="filterVideos('Music')">Music</button>
    <button onclick="filterVideos('Gaming')">Gaming</button>
  </div>

  <div id="videoGrid"></div>

</div>

<!-- UPLOAD PAGE -->
<div id="upload" class="page">

  <h2>Upload Video</h2>

  <input id="videoLink" placeholder="YouTube link">

  <button onclick="addVideo()">Add</button>

</div>

<!-- ACCOUNT PAGE -->
<div id="account" class="page">

  <h2>Profile</h2>
  <p>Your uploads will appear here later</p>

</div>

<!-- VIDEO POPUP -->
<div id="popup" class="popup">

  <iframe id="videoFrame"></iframe>

  <button onclick="closeVideo()">Close</button>

</div>

<script src="script.js"></script>

</body>
</html>
